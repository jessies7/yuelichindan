<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>月历清单</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="月历清单">
  <meta name="theme-color" content="#f5efe6">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5efe6">
  <link rel="stylesheet" href="style.css?v=mobile-calendar-visual-29">
</head>
<body>
  <div id="installBanner" class="install-banner" style="display:none">
    <div class="install-banner-inner">
      <span>添加到主屏幕，像 App 一样使用</span>
      <div class="install-banner-actions">
        <button type="button" id="installBtn" class="install-banner-btn install-banner-primary">立即添加</button>
        <button type="button" id="installDismiss" class="install-banner-btn">暂不</button>
      </div>
    </div>
  </div>
  <main class="planner-shell">
    <section id="messageBox" class="planner-message" aria-live="polite"></section>
    <section id="contentPanel" class="planner-stage"></section>
  </main>
  <div id="imagePreviewModal" class="image-preview-modal" aria-live="polite"></div>

  <script src="main.js?v=mobile-calendar-list-32"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
    (function() {
      if (window.matchMedia('(display-mode: standalone)').matches) return;
      var banner = document.getElementById('installBanner');
      var dismiss = document.getElementById('installDismiss');
      var installBtn = document.getElementById('installBtn');
      var deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        banner.style.display = 'flex';
      });
      setTimeout(function() { banner.style.display = 'flex'; }, 1200);
      dismiss.addEventListener('click', function() { banner.style.display = 'none'; });
      installBtn.addEventListener('click', function() {
        banner.style.display = 'none';
        if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; return; }
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        if (isIOS) { alert('请点底部分享按钮，然后选择"添加到主屏幕"'); }
        else { alert('请点浏览器菜单(右上角三个点)，然后选择"添加到主屏幕"或"安装应用"'); }
      });
    })();
    (function() {
      if (!window.visualViewport) return;
      var vv = window.visualViewport;
      function onResize() {
        document.documentElement.style.height = vv.height + 'px';
        if (document.activeElement) {
          document.activeElement.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
      }
      vv.addEventListener('resize', onResize);
      vv.addEventListener('scroll', onResize);
      document.addEventListener('focusin', function(e) {
        if (e.target.matches('input, textarea, [contenteditable]')) {
          setTimeout(function() {
            e.target.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }, 300);
        }
      });
    })();
  </script>
</body>
</html>
